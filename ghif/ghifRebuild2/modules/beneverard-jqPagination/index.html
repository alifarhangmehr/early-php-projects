<div class="gigantic pagination">
			    <a href="#" class="first" data-action="first">&laquo;</a>

			</div>

        <script language="javascript" type="text/javascript">

			paged: function(page) {
				//alert(page);
				// do something with the page variable
				window.location = "showGood.php?limits="+page;
			}
		});
		</script>
